<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Code de Connexion DIWA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 10px; }
        .header { background-color: #1A5276; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; text-align: center; }
        .otp-code { font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #1A5276; background-color: #f4f7f9; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DIWA Internationale</h1>
        </div>
        <div class="content">
            <p>Bonjour <span th:text="${userName}">Utilisateur</span>,</p>
            <p>Voici votre code de vérification pour vous connecter à votre compte DIWA :</p>
            <div class="otp-code" th:text="${otpCode}">000000</div>
            <p>Ce code est valable pendant <span th:text="${expirationMinutes}">10</span> minutes.</p>
            <p>Si vous n'êtes pas à l'origine de cette demande, veuillez ignorer cet email.</p>
        </div>
        <div class="footer">
            <p>&copy; 2025 DIWA Internationale. Tous droits réservés.</p>
        </div>
    </div>
</body>
</html>
