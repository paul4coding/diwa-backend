# ──────────────────────────────────────────────────────────────────
# DIWA Backend — Profil PRODUCTION
# Toutes les valeurs sensibles sont lues depuis les variables d'env
# ──────────────────────────────────────────────────────────────────

# ── Serveur ──────────────────────────────────────────────────────
server.port=8181
server.address=0.0.0.0

# ── Base de données ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── JWT ──────────────────────────────────────────────────────────
diwa.app.jwtSecret=${DIWA_APP_JWT_SECRET}
diwa.app.jwtExpirationMs=${DIWA_APP_JWT_EXPIRATION_MS:28800000}

# ── Email Gmail ──────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ── Application DIWA ─────────────────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL}
app.mail.from=${APP_MAIL_FROM}
app.mail.from-name=DIWA Elite Admin
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}

# ── Admin initial ────────────────────────────────────────────────
app.admin.initial-password=${DIWA_ADMIN_PASSWORD}

# ── OTP / Tokens ─────────────────────────────────────────────────
app.otp.expiration-minutes=10
app.otp.length=6
app.token.confirmation-expiration-hours=24
app.token.reset-expiration-hours=2

# ── Initialisation données au démarrage ─────────────────────────
# data.sql s'exécute APRÈS que Hibernate crée les tables (defer)
# ON CONFLICT DO NOTHING dans data.sql = idempotent au redémarrage
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── Upload ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=128KB

# ── Swagger (désactivé en prod) ──────────────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
